name: Build Android Local via EAS

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main

  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: ☕ Setup Java SDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      # Prevent Gradle from using too much memory
      - name: 🔧 Configure Gradle Memory Limits
        run: |
          mkdir -p ~/.gradle
          cat <<EOF >> ~/.gradle/gradle.properties
          org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
          EOF

      - name: 📦 Install EAS CLI
        run: yarn global add eas-cli

      - name: 📦 Install dependencies with Yarn
        run: |
          yarn install --mode=skip-build


      - name: 🧪 Prebuild Android
        run: |
          npx expo prebuild --platform android --no-install

      - name: 🚀 Build Android App Locally
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --platform android --profile preview --local --non-interactive
