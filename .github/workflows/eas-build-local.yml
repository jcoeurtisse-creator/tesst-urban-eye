name: Build Android Local via EAS

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main

  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ☕ Setup Java SDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      # Prevent Gradle from using too much memory
      - name: 🔧 Configure Gradle Memory Limits
        run: |
          mkdir -p ~/.gradle
          cat <<EOF >> ~/.gradle/gradle.properties
          org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
          EOF

      - name: 📦 Install EAS CLI
        run: npm install -g eas-cli

      - name: 🧹 Clear npm cache completely
        run: |
          npm cache clean --force
          rm -rf ~/.npm ~/.npmrc /tmp/npm-cache
          echo "npm cache cleared successfully"

      - name: 🌐 Configure npm for resilience
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set fetch-retries 10
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 180000
          npm config set strict-ssl true
          echo "npm configuration updated"

      - name: 📦 Install dependencies
        run: |
          npm ci --legacy-peer-deps --prefer-online --no-audit --no-fund
        env:
          npm_config_loglevel: verbose

      - name: 🧪 Prebuild Android
        run: |
          npx expo prebuild --platform android --no-install

      - name: 🚀 Build Android App Locally
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --platform android --profile preview --local --non-interactive
