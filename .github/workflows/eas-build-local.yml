name: Build Android Local via EAS

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main

  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: ☕ Setup Java SDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      # Prevent Gradle from using too much memory
      - name: 🔧 Configure Gradle Memory Limits
        run: |
          mkdir -p ~/.gradle
          cat <<EOF >> ~/.gradle/gradle.properties
          org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
          org.gradle.workers.max=2
          EOF

      - name: 📦 Install EAS CLI
        run: npm install -g eas-cli

      - name: 🧹 Clear npm cache and configure resilience
        run: |
          npm cache clean --force
          npm config set registry https://registry.npmjs.org/
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 10000
          npm config set fetch-retry-maxtimeout 120000
          npm config set maxsockets 1
          npm config set strict-ssl true

      - name: 📦 Install dependencies
        run: |
          npm install --force --legacy-peer-deps --no-audit --no-fund


      - name: 🧪 Prebuild Android
        run: |
          npx expo prebuild --platform android --no-install

      # AJOUTE CETTE ÉTAPE POUR LA RAM DE GRADLE
      - name: Configure Gradle Memory Limits
        run: |
          mkdir -p ~/.gradle
          cat <<EOF >> ~/.gradle/gradle.properties
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m
          org.gradle.workers.max=4
          org.gradle.daemon=false
          org.gradle.parallel=true
          org.gradle.caching=true
          EOF

      - name: 🚀 Build Android App Locally
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ANDROID_HOME: /usr/local/lib/android/sdk
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
        run: |
          eas build --platform android --profile preview --local --non-interactive

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: urban-test-apk
          path: build-*.apk
