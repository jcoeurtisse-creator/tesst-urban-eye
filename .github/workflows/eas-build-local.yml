name: Build Android Local via EAS
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ☕ Setup Java SDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Prevents Gradle from exceeding GitHub's 7GB RAM limit
      - name: 🔧 Configure Gradle Memory Limits
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> ~/.gradle/gradle.properties

      - name: 📦 Install EAS CLI
        run: npm install -g eas-cli

      - name: 🧹 Clean npm cache
        run: npm cache clean --force

      - name: 📦 Install dependencies
        run: |
          npm config set registry https://registry.npmjs.org/
          npm cache clean --force
          npm ci --prefer-online --cache /tmp/npm-cache

      - name: 🧪 Prebuild Android (quick check)
        run: |
          npx expo prebuild --platform android --no-install || true
          if [ -d android ]; then
            cd android
            ./gradlew assembleRelease --warning-mode=all --no-daemon -Dorg.gradle.jvmargs="-Xmx1536m -XX:MaxMetaspaceSize=512m" || true
          fi

      - name: 🚀 Build Android App Locally
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile preview --local --non-interactive
